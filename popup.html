<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h3>SaxoTrader Grabber</h3>
    <div id="status-list">
      <div class="item" data-target="/oapi/portfolio/v3/balances/subscriptions">
        <span class="label">Balances:</span>
        <span class="status">Waiting...</span>
        <button class="download-btn" disabled>Download</button>
      </div>
      <div class="item" data-target="/oapi/portfolio/v3/netpositions/subscriptions">
        <span class="label">Net Positions:</span>
        <span class="status">Waiting...</span>
        <button class="download-btn" disabled>Download</button>
      </div>
      <div class="item" data-target="/oapi/portfolio/v3/orders/subscriptions">
        <span class="label">Orders:</span>
        <span class="status">Waiting...</span>
        <button class="download-btn" disabled>Download</button>
      </div>
      <div class="item" data-target="/oapi/news/v1/subscriptions">
        <span class="label">News:</span>
        <span class="status">Waiting...</span>
        <button class="download-btn" disabled>Download</button>
      </div>
    </div>
    <div class="action-buttons">
      <button id="download-all" disabled>Download All</button>
      <button id="clear-data">Clear Stored Data</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
