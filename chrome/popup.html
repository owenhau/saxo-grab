<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h3>Saxo Monitoring Status</h3>
    <div id="status-list">
      <div class="item" data-target="balances">
        <span class="label">Balances</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="netpositions">
        <span class="label">Net Positions</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="orders">
        <span class="label">Orders</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="news">
        <span class="label">News</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="transactions">
        <span class="label">Transactions</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="earnings">
        <span class="label">Earnings</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="watchlists">
        <span class="label">Watchlist</span>
        <span class="status">waiting</span>
      </div>
      <div class="item" data-target="stockCharts">
        <span class="label">Stock Charts</span>
        <span class="status">waiting</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
